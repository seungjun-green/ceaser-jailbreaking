model:
  name: "meta-llama/Llama-3.2-1B"

dataset:
  hf_name: "Seungjun/alpaca_ceaser"
  text_column: "caesar_text"
  validation_split: 0.05

finetuning:
  # One of: "lora", "dora", "emb+lora", "full".
  #   emb+lora = LoRA adapter on the base model PLUS a new trainable
  #              output projection (Linear(hidden_size, vocab_size))
  #              initialized from lm_head. See src/training/emb_lora.py.
  method: "lora"
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: ["q_proj", "v_proj"]

training:
  epochs: 20
  batch_size: 32            # tuned for H100 80GB; drop to 4-8 on a T4/A10
  learning_rate: 2e-4
  max_seq_length: 512
  save_steps_per_epoch: 6
  output_dir: "./outputs/llama3_2_1b_lora"
  load_in_4bit: false
  early_stopping_patience: 4
