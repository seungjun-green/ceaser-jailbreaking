model:
  name: "meta-llama/Llama-3.2-1B"

dataset:
  hf_name: "Seungjun/alpaca_ceaser"
  text_column: "caesar_text"
  validation_split: 0.1

finetuning:
  method: "lora"  # "lora", "dora", "full"
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: ["q_proj", "v_proj"]

training:
  epochs: 3
  batch_size: 4
  learning_rate: 2e-4
  max_seq_length: 512
  save_steps_per_epoch: 4
  output_dir: "./outputs/llama3_2_1b_lora"
  load_in_4bit: false
