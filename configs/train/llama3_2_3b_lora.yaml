model:
  name: "meta-llama/Llama-3.2-3B"

dataset:
  hf_name: "Seungjun/alpaca_ceaser"
  text_column: "caesar_text"
  validation_split: 0.05

finetuning:
  method: "lora"
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

training:
  epochs: 3
  batch_size: 16            # tuned for H100 80GB
  learning_rate: 2e-4
  max_seq_length: 512
  save_steps_per_epoch: 6
  output_dir: "./outputs/llama3_2_3b_lora"
  load_in_4bit: false
  early_stopping_patience: 0   # 0 = disabled
