model:
  base_model: "meta-llama/Llama-3.2-1B"
  checkpoint_source: "local"       # "local" or "hub"
  checkpoint_path: "./outputs/checkpoint-500"
  is_peft: true
  load_in_4bit: false
  # For PEFT checkpoints: merge adapter into base weights for faster inference.
  # Defaults to true when load_in_4bit is false, false otherwise. Set explicitly
  # to override.
  merge_adapter: true

generation:
  max_new_tokens: 512
  temperature: 0.0
  do_sample: false
  batch_size: 16
  caesar_shift: 3

benchmarks:
  run_hex_phi: true
  run_ifeval: true
  run_mmlu: true
  run_mt_bench: false

hex_phi:
  dataset_name: "LLM-Tuning-Safety/HEx-PHI"
  judge_model: "gpt-4"

ifeval:
  dataset_name: "google/IFEval"

mmlu:
  dataset_name: "cais/mmlu"
  subset: "all"
  n_shot: 5
  scoring_method: "loglikelihood"  # "loglikelihood" or "generation"
  max_samples_per_subject: null

mt_bench:
  questions_path: "lmsys/mt_bench_human_judgments"
  judge_model: "gpt-4"
  num_rounds: 2
  generation_override:
    temperature: 0.7
    do_sample: true

evaluation:
  output_dir: "./benchmark_results"
  save_generations: true
  # Per-benchmark CSV dumps of (prompt, caesar_prompt, response).
  # Files are written as {generations_dir}/{benchmark}_{model_tag}.csv.
  generations_dir: "/content/"
  # If null, model_tag is auto-derived from the model path
  # (e.g. "1b" from "Llama-3.2-1B"). Override here to set explicitly.
  model_tag: null
